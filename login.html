<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriGrow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--green-dark);">
    <div class="form-box">
        <h2 style="text-align: center;">Login to AgriGrow</h2>
        <br>
        <form action="dashboard.html">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" required>
            </div>
            <button type="submit" class="btn-simple" style="width: 100%;">Sign In</button>
        </form>
        <br>
        <p style="text-align: center;"><a href="index.html" style="color: var(--green-dark);">Back to Home</a></p>
    </div>
</body>
</html>
